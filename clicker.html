<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Frenzy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Syne:wght@700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070e;--surface:#0e0e1a;--surface2:#131320;--border:#1c1c30;--border2:#28284a;
  --text:#dcdcf0;--muted:#52527a;
  --p1:#00f0ff;--p2:#ff3060;--gold:#ffd700;--green:#00ff88;--purple:#9945ff;--orange:#ff8800;
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden;}
#game{display:flex;width:100%;height:100vh;}

/* UPGRADES PANEL */
#upgrades-panel{
  width:268px;flex-shrink:0;height:100%;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(180deg,#0b0b17 0%,var(--surface) 100%);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
}
#upgrades-panel::-webkit-scrollbar{width:3px;}
#upgrades-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.up-header{padding:13px 13px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.up-header-title{
  font-family:var(--display);font-size:12px;font-weight:800;letter-spacing:3px;
  color:var(--text);display:flex;align-items:center;gap:7px;margin-bottom:9px;
}
.up-header-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.up-header-icon svg{width:15px;height:15px;stroke:var(--p1);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px var(--p1));}
.up-tabs{display:flex;gap:2px;}
.up-tab{flex:1;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;padding:5px 3px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;transition:all 0.13s;text-transform:uppercase;}
.up-tab.active{color:var(--p1);border-color:rgba(0,240,255,0.4);background:rgba(0,240,255,0.06);}
.upgrades-list{flex:1;padding:7px;display:flex;flex-direction:column;gap:5px;}

/* UPGRADE CARD */
.upg-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  padding:10px;cursor:pointer;transition:border-color 0.15s,transform 0.1s,box-shadow 0.15s;
  position:relative;overflow:hidden;
}
.upg-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.18s;pointer-events:none;
  background:radial-gradient(ellipse at 0% 0%,var(--gc,rgba(0,240,255,0.12)) 0%,transparent 60%);
}
.upg-card:hover{transform:translateX(3px);border-color:var(--gb,rgba(0,240,255,0.3));box-shadow:0 3px 18px rgba(0,0,0,0.45);}
.upg-card:hover::before{opacity:1;}
.upg-card.affordable{border-color:rgba(255,215,0,0.18);}
.upg-card.affordable .upg-cost{color:var(--gold)!important;}
.upg-card.maxed{opacity:0.38;pointer-events:none;}

.upg-row1{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.upg-icon{
  width:34px;height:34px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--gi,rgba(0,240,255,0.08));border:1px solid var(--gib,rgba(0,240,255,0.18));
  position:relative;overflow:hidden;
}
.upg-icon::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,0.07),transparent 70%);}
.upg-icon svg{width:17px;height:17px;stroke:var(--gc2,#00f0ff);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px var(--gc2,#00f0ff));position:relative;z-index:1;}
.upg-meta{flex:1;min-width:0;}
.upg-name{font-size:10.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.upg-lvl{font-size:8.5px;color:var(--muted);margin-top:1px;letter-spacing:0.5px;}
.upg-maxbadge{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--green);border:1px solid rgba(0,255,136,0.3);padding:1px 5px;border-radius:2px;background:rgba(0,255,136,0.06);}
.upg-desc{font-size:9px;color:var(--muted);line-height:1.55;margin-bottom:6px;}
.upg-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.upg-cost{font-size:10px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:3px;flex-shrink:0;}
.upg-cost svg{width:10px;height:10px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.upg-bar{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.upg-bar-fill{height:100%;border-radius:2px;transition:width 0.3s ease;}

/* CENTER */
#clicker-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#bg-cvs{position:absolute;inset:0;z-index:0;pointer-events:none;}
#p-cvs{position:absolute;inset:0;pointer-events:none;z-index:2;}

/* STATS BAR */
#stats-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-around;
  padding:9px 14px;background:rgba(7,7,14,0.92);border-bottom:1px solid var(--border);
  backdrop-filter:blur(14px);z-index:10;
}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.stat-lbl{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.stat-val{font-family:var(--display);font-size:16px;font-weight:800;line-height:1;}

/* CLICK BUTTON */
#click-wrap{position:relative;z-index:5;margin-top:34px;}
.pring{position:absolute;border-radius:50%;pointer-events:none;animation:pring 2.6s ease-out infinite;}
.pring:nth-child(1){inset:-18px;border:1px solid rgba(0,240,255,0.28);animation-delay:0s;}
.pring:nth-child(2){inset:-32px;border:1px solid rgba(153,69,255,0.2);animation-delay:.87s;}
.pring:nth-child(3){inset:-48px;border:1px solid rgba(0,240,255,0.12);animation-delay:1.74s;}
@keyframes pring{0%{opacity:.8;transform:scale(.82);}100%{opacity:0;transform:scale(1.12);}}

#click-btn{
  width:188px;height:188px;border-radius:50%;
  border:2px solid var(--p1);
  background:radial-gradient(circle at 38% 32%,rgba(0,240,255,0.17) 0%,rgba(0,240,255,0.03) 55%,transparent 100%);
  cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;
  box-shadow:0 0 55px rgba(0,240,255,0.22),0 0 110px rgba(0,240,255,0.07),inset 0 0 50px rgba(0,240,255,0.06);
  font-family:var(--mono);user-select:none;-webkit-user-select:none;
  transition:transform .07s,box-shadow .1s;overflow:visible;
}
#click-btn::before{content:'';position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,240,255,0.07);}
#click-btn::after{content:'';position:absolute;inset:22px;border-radius:50%;border:1px solid rgba(0,240,255,0.04);}
#click-btn:hover{transform:scale(1.05);box-shadow:0 0 80px rgba(0,240,255,0.4),0 0 150px rgba(0,240,255,0.1),inset 0 0 65px rgba(0,240,255,0.1);}
#click-btn.pressed{transform:scale(.90)!important;box-shadow:0 0 110px rgba(0,240,255,0.65),inset 0 0 90px rgba(0,240,255,0.2)!important;}
#btn-main-svg{width:52px;height:52px;pointer-events:none;stroke:var(--p1);fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 10px rgba(0,240,255,0.7));position:relative;z-index:1;}
.btn-lbl{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--p1);pointer-events:none;text-shadow:0 0 12px rgba(0,240,255,0.5);position:relative;z-index:1;}
.btn-sub{font-size:8px;color:var(--muted);pointer-events:none;letter-spacing:1px;position:relative;z-index:1;}

/* BOOST */
#boost-wrap{position:relative;z-index:5;margin-top:13px;text-align:center;}
#boost-bar-bg{width:185px;height:5px;background:var(--border2);border-radius:3px;margin:5px auto 0;overflow:hidden;}
#boost-bar-fill{height:100%;border-radius:3px;transition:width .1s;width:100%;background:linear-gradient(90deg,var(--p1),var(--purple));}
#boost-lbl{font-size:9px;color:var(--muted);letter-spacing:2px;}
.boost-on{color:var(--p2)!important;animation:flicker .45s infinite alternate;}
@keyframes flicker{from{opacity:1}to{opacity:.5}}

/* FLOAT TEXT */
.ft{position:fixed;pointer-events:none;font-family:var(--display);font-size:20px;font-weight:800;z-index:9999;animation:ftup .88s ease forwards;white-space:nowrap;text-shadow:0 0 10px currentColor;}
.ft.big{font-size:30px!important;}
@keyframes ftup{0%{opacity:1;transform:translate(-50%,-50%) scale(.6);}15%{opacity:1;transform:translate(-50%,-85%) scale(1.15);}100%{opacity:0;transform:translate(-50%,-310%) scale(.85);}}

/* PRESTIGE */
#prestige-btn{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:3px;padding:7px 20px;background:transparent;border:1px solid var(--purple);border-radius:4px;color:var(--purple);cursor:pointer;transition:all .18s;display:none;z-index:10;}
#prestige-btn:hover{background:var(--purple);color:#07070e;box-shadow:0 0 20px rgba(153,69,255,.4);}
#key-hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--muted);letter-spacing:2px;z-index:5;}

/* LOGIN PROMPT */
#login-prompt{position:absolute;inset:0;background:rgba(7,7,14,.9);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;backdrop-filter:blur(6px);}
#login-prompt.hidden{display:none!important;}
.lp-t{font-family:var(--display);font-size:22px;font-weight:800;color:var(--p1);}
.lp-s{font-size:11px;color:var(--muted);text-align:center;line-height:1.9;}
.lp-btn{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:3px;padding:12px 30px;background:linear-gradient(135deg,var(--p1),var(--purple));color:#07070e;border:none;border-radius:4px;cursor:pointer;transition:all .18s;}
.lp-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(0,240,255,.4);}
.lp-ghost{font-family:var(--mono);font-size:10px;background:transparent;border:1px solid var(--muted);color:var(--muted);padding:6px 16px;border-radius:3px;cursor:pointer;transition:all .15s;}
.lp-ghost:hover{border-color:var(--text);color:var(--text);}

/* RIGHT PANEL */
#right-panel{width:248px;flex-shrink:0;height:100%;overflow-y:auto;background:linear-gradient(180deg,#0b0b17 0%,var(--surface) 100%);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:10px;gap:10px;}
#right-panel::-webkit-scrollbar{width:3px;}
#right-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.rp-box{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:11px;}
.rp-title{font-size:8px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.rp-title svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.rp-stat{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:10px;}
.rp-stat:last-child{border-bottom:none;}
.rp-k{color:var(--muted);}
.rp-v{font-weight:700;}

/* MINI LB */
.mlb-row{display:flex;align-items:center;gap:7px;padding:5px 7px;background:var(--bg);border-radius:5px;margin-bottom:3px;font-size:10px;border:1px solid transparent;}
.mlb-row.me{border-color:rgba(0,240,255,.25);background:rgba(0,240,255,.03);}
.mlb-rank{width:17px;text-align:center;font-weight:800;flex-shrink:0;}
.mlb-av{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.mlb-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mlb-val{color:var(--gold);font-size:9px;font-weight:700;flex-shrink:0;}

/* ACHIEVEMENT */
#ach-root{position:fixed;top:10px;right:10px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.ach-toast{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--gold);border-radius:8px;padding:9px 13px;min-width:195px;animation:achpop .3s ease,achfade .4s 3.6s forwards;box-shadow:0 0 20px rgba(255,215,0,.2);}
@keyframes achpop{from{opacity:0;transform:scale(.8) translateX(20px)}to{opacity:1;transform:scale(1) translateX(0)}}
@keyframes achfade{from{opacity:1}to{opacity:0;transform:translateX(20px)}}
.ach-icon{width:26px;height:26px;border-radius:5px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ach-icon svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ach-tt{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
.ach-nn{font-size:11px;font-weight:700;}

/* OFFLINE */
.offline-banner{background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.25);border-radius:6px;padding:10px;font-size:10px;line-height:1.6;animation:fadein .4s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="ach-root"></div>
<div id="game">

<!-- UPGRADES PANEL -->
<div id="upgrades-panel">
  <div class="up-header">
    <div class="up-header-title">
      <div class="up-header-icon">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      UPGRADES
    </div>
    <div class="up-tabs">
      <button class="up-tab active" onclick="switchUpgTab('click',this)">Click</button>
      <button class="up-tab" onclick="switchUpgTab('passive',this)">Passive</button>
      <button class="up-tab" onclick="switchUpgTab('special',this)">Special</button>
    </div>
  </div>
  <div class="upgrades-list" id="upgrades-list"></div>
</div>

<!-- CENTER -->
<div id="clicker-center">
  <canvas id="bg-cvs"></canvas>
  <canvas id="p-cvs"></canvas>

  <div id="stats-bar">
    <div class="stat-item"><div class="stat-lbl">coins</div><div class="stat-val" id="s-coins" style="color:var(--gold)">0</div></div>
    <div class="stat-item"><div class="stat-lbl">per sec</div><div class="stat-val" id="s-cps" style="color:var(--green)">0/s</div></div>
    <div class="stat-item"><div class="stat-lbl">clicks</div><div class="stat-val" id="s-clicks" style="color:var(--p1)">0</div></div>
    <div class="stat-item"><div class="stat-lbl">mult</div><div class="stat-val" id="s-mult" style="color:var(--p2)">×1</div></div>
    <div class="stat-item"><div class="stat-lbl">prestige</div><div class="stat-val" id="s-prestige" style="color:var(--purple)">0</div></div>
  </div>

  <div id="login-prompt" class="hidden">
    <div class="lp-t">CLICK FRENZY</div>
    <div class="lp-s">Sign in to save progress,<br>compete on leaderboards & unlock cosmetics.</div>
    <button class="lp-btn" onclick="window.parent.postMessage({type:'open_auth'},'*')">Sign In / Register</button>
    <button class="lp-ghost" onclick="playAsGuest()">Play as Guest</button>
  </div>

  <div id="click-wrap">
    <div class="pring"></div><div class="pring"></div><div class="pring"></div>
    <button id="click-btn" onmousedown="handleClick(event)" ontouchstart="handleTouch(event)">
      <svg id="btn-main-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 3l14 9-7 1-4 7z"/>
      </svg>
      <span class="btn-lbl">CLICK</span>
      <span class="btn-sub" id="btn-sub">+1 per click</span>
    </button>
  </div>

  <div id="boost-wrap">
    <div id="boost-lbl">BOOST READY</div>
    <div id="boost-bar-bg"><div id="boost-bar-fill"></div></div>
  </div>

  <div id="key-hint"></div>
  <button id="prestige-btn" onclick="doPrestige()">PRESTIGE — reset for ×2 bonus</button>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">

  <div class="rp-box">
    <div class="rp-title">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      SESSION
    </div>
    <div class="rp-stat"><span class="rp-k">earned</span><span class="rp-v" id="rp-session" style="color:var(--gold)">0</span></div>
    <div class="rp-stat"><span class="rp-k">click power</span><span class="rp-v" id="rp-power" style="color:var(--p1)">1</span></div>
    <div class="rp-stat"><span class="rp-k">passive/sec</span><span class="rp-v" id="rp-cps" style="color:var(--green)">0</span></div>
    <div class="rp-stat"><span class="rp-k">best hit</span><span class="rp-v" id="rp-crit" style="color:var(--p2)">0</span></div>
    <div class="rp-stat"><span class="rp-k">upgrades</span><span class="rp-v" id="rp-upgs">0</span></div>
    <div class="rp-stat"><span class="rp-k">click key</span><span class="rp-v" id="rp-key" style="color:var(--p1)">SPACE</span></div>
  </div>

  <div id="offline-wrap"></div>

  <div class="rp-box">
    <div class="rp-title">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      LEADERBOARD
    </div>
    <div id="mini-lb"><div style="font-size:10px;color:var(--muted)">loading...</div></div>
    <button onclick="loadMiniLb()" style="font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:5px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;margin-top:7px;transition:all .15s;width:100%" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">↺ REFRESH</button>
  </div>

  <div class="rp-box">
    <div class="rp-title">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      ACHIEVEMENTS
    </div>
    <div id="ach-list" style="display:flex;flex-direction:column;gap:4px;"></div>
  </div>

</div>
</div>

<script src="pf.js"></script>
<script>
// ── ICON PATHS (SVG path data only, rendered inside <svg viewBox="0 0 24 24">) ──
const IC = {
  mouse:    `<path d="M5 3l14 9-7 1-4 7z"/>`,
  keyboard: `<rect x="2" y="7" width="20" height="12" rx="2"/><line x1="6" y1="11" x2="6" y2="11"/><line x1="10" y1="11" x2="10" y2="11"/><line x1="14" y1="11" x2="14" y2="11"/><line x1="18" y1="11" x2="18" y2="11"/><line x1="7" y1="15" x2="17" y2="15"/>`,
  zap:      `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
  star:     `<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
  target:   `<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`,
  flame:    `<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/>`,

// ── BACKGROUND CANVAS ─────────────────────────────────────
const bgC=document.getElementById('bg-cvs');
const bgX=bgC.getContext('2d');
function resizeBg(){bgC.width=bgC.offsetWidth||700;bgC.height=bgC.offsetHeight||600;}
resizeBg();
let gt=0;
(function drawBg(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  gt+=.007;
  const p=Math.sin(gt)*.5+.5;
  const sz=44;
  bgX.lineWidth=.5;
  bgX.strokeStyle=`rgba(0,240,255,${.03+p*.015})`;
  for(let x=0;x<bgC.width;x+=sz){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,bgC.height);bgX.stroke();}
  for(let y=0;y<bgC.height;y+=sz){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(bgC.width,y);bgX.stroke();}
  bgX.strokeStyle=`rgba(153,69,255,${.022+p*.01})`;
  for(let i=-bgC.height;i<bgC.width+bgC.height;i+=155){
    bgX.beginPath();bgX.moveTo(i,0);bgX.lineTo(i+bgC.height,bgC.height);bgX.stroke();
  }
  requestAnimationFrame(drawBg);
})();

// ── PARTICLES ─────────────────────────────────────────────
const pC=document.getElementById('p-cvs');
const pX=pC.getContext('2d');
function resizeP(){pC.width=pC.offsetWidth||700;pC.height=pC.offsetHeight||600;}
resizeP();
const particles=[];
function spawnP(x,y,color,count=4){
  for(let i=0;i<count;i++)
    particles.push({x,y,vx:(Math.random()-.5)*6,vy:-2-Math.random()*5,life:1,color,r:1.2+Math.random()*2.5});
}
(function drawP(){
  pX.clearRect(0,0,pC.width,pC.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.life-=.027;
    if(p.life<=0){particles.splice(i,1);continue;}
    pX.globalAlpha=p.life;
    pX.beginPath();pX.arc(p.x,p.y,p.r,0,Math.PI*2);
    pX.fillStyle=p.color;pX.fill();
  }
  pX.globalAlpha=1;
  requestAnimationFrame(drawP);
})();
window.addEventListener('resize',()=>{resizeBg();resizeP();});

// ── STATS ─────────────────────────────────────────────────
function getCV(){return Math.floor(G.clickPow*G.prestigeMult+G.clickFlat);}
function getCPS(){return G.cps*G.cpsMult*G.prestigeMult;}
function getUCost(u){return Math.floor(u.cost*Math.pow(u.cm,G.upgrades[u.id]||0));}
function fmtN(n){
  if(n>=1e12)return(n/1e12).toFixed(1)+'T';
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}
function fmtKey(code){return (code||'Space').replace('Key','').replace('Arrow','').replace('Digit','').toUpperCase();}
function strColor(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return`hsl(${h%360},70%,45%)`;}

// ── CLICK HANDLER ─────────────────────────────────────────
function handleClick(e){e.preventDefault();doClick(e.clientX,e.clientY);}
function handleTouch(e){e.preventDefault();const t=e.touches[0];doClick(t.clientX,t.clientY);}

function doClick(cx,cy){
  const btn=document.getElementById('click-btn');
  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'),75);

  let val=getCV();
  if(G.boostActive)val=Math.floor(val*G.boostMult);
  val=Math.floor(val*G.comboVal);

  G.comboTimer=30;
  G.comboVal=Math.min(G.comboVal+(G.combo*.1),1+G.combo*5);

  let isCrit=false,isLucky=false;
  if(Math.random()<G.critChance){val=Math.floor(val*5);isCrit=true;}
  if(Math.random()<G.luckyChance){val=Math.floor(val*100);isLucky=true;}
  if(val>G.bestCrit)G.bestCrit=val;

  earn(val);G.clicks++;G.totalClicks++;

  const col=isLucky?'#ffd700':isCrit?'#ff3060':G.boostActive?'#ff8800':'#00f0ff';
  const lbl=isLucky?`×100 LUCKY!`:isCrit?`CRIT ×5!`:`+${fmtN(val)}`;

  const ft=document.createElement('div');
  ft.className='ft'+(isCrit||isLucky?' big':'');
  ft.style.cssText=`color:${col};left:${cx}px;top:${cy}px`;
  ft.textContent=lbl;
  document.body.appendChild(ft);
  setTimeout(()=>ft.remove(),920);

  const pr=pC.getBoundingClientRect();
  spawnP(cx-pr.left,cy-pr.top,col,isLucky?10:isCrit?7:4);

  if(settings.sfx)playClick(isCrit||isLucky);
  updateUI();checkAchs();
}

function earn(v){G.coins+=v;G.totalCoins+=v;G.sessionCoins+=v;}

// ── PASSIVE + TIMERS ─────────────────────────────────────
setInterval(()=>{
  const cps=getCPS();
  if(cps>0){earn(cps/20);updateUI();}
  if(G.comboTimer>0){G.comboTimer--;if(!G.comboTimer)G.comboVal=1;}
  if(G.boostActive){G.boostTimer--;if(G.boostTimer<=0){G.boostActive=false;G.boostCooldown=600;updateBoostUI();}}
  if(G.boostCooldown>0){G.boostCooldown--;updateBoostUI();}
},50);

setInterval(()=>{
  if(G.autoClick>0){const btn=document.getElementById('click-btn'),r=btn.getBoundingClientRect();doClick(r.left+r.width/2,r.top+r.height/2);}
},1000);

// ── BOOST ─────────────────────────────────────────────────
function activateBoost(){
  if(G.boostActive||G.boostCooldown>0)return;
  G.boostActive=true;G.boostTimer=G.boostDur*20;
  updateBoostUI();if(settings.sfx)playBoost();
}
function updateBoostUI(){
  const lbl=document.getElementById('boost-lbl');
  const fill=document.getElementById('boost-bar-fill');
  const bk=fmtKey(settings.keybinds?.boost||'KeyB');
  if(G.boostActive){
    lbl.className='boost-on';lbl.textContent=`BOOST ×${G.boostMult} ACTIVE!`;
    fill.style.width=(G.boostTimer/(G.boostDur*20)*100)+'%';
    fill.style.background='linear-gradient(90deg,#ff3060,#ff8800)';
  } else if(G.boostCooldown>0){
    lbl.className='';lbl.textContent='COOLING DOWN...';
    fill.style.width=(1-G.boostCooldown/600)*100+'%';
    fill.style.background='var(--muted)';
  } else {
    lbl.className='';lbl.textContent=`BOOST READY  [${bk}]`;
    fill.style.width='100%';
    fill.style.background='linear-gradient(90deg,var(--p1),var(--purple))';
  }
}

function renderUpgrades(){
  const list=document.getElementById('upgrades-list');
  list.innerHTML=UPGRADES[curTab].map(u=>{
    const lvl=G.upgrades[u.id]||0;
    const cost=getUCost(u);
    const maxed=lvl>=u.max;
    const afford=!maxed&&G.coins>=cost;
    const pct=(lvl/u.max)*100;
    const iconSvg=IC[u.ic]||IC.star;
    return `<div class="upg-card${maxed?' maxed':''}${afford?' affordable':''}"
      style="--gc:${u.c}22;--gb:${u.c}55;--gi:${u.c}18;--gib:${u.c}33;--gc2:${u.c}"
      onclick="${maxed?'':` buyUpg('${u.id}')`}">
      <div class="upg-row1">
        <div class="upg-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${iconSvg}</svg>
        </div>
        <div class="upg-meta">
          <div class="upg-name">${u.name}</div>
          <div class="upg-lvl">${maxed?`<span class="upg-maxbadge">MAX</span>`:`Lv ${lvl} / ${u.max}`}</div>
        </div>
      </div>
      <div class="upg-desc">${u.desc}</div>
      <div class="upg-foot">
        <div class="upg-cost">${maxed?'':
          `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${IC.coin}</svg>${fmtN(cost)}`}
        </div>
        <div class="upg-bar">
          <div class="upg-bar-fill" style="width:${pct}%;background:${u.c};box-shadow:0 0 5px ${u.c}99"></div>
        </div>

  }).join('');

function buyUpg(id){
  const u=ALL_UPG.find(x=>x.id===id);if(!u)return;
  const lvl=G.upgrades[id]||0;
  if(lvl>=u.max)return;
  const cost=getUCost(u);
  if(G.coins<cost)return;
  G.coins-=cost;G.upgrades[id]=lvl+1;G.upgradeCount++;
  applyUpg(u,1);renderUpgrades();updateUI();checkAchs();
  if(settings.sfx)playBuy();
  scheduleSave();
}

function applyUpg(u,n=1){
  for(let i=0;i<n;i++){
    switch(u.fx){
      case 'clickPow':G.clickPow*=u.v;break;
      case 'clickFlat':G.clickFlat+=u.v;break;
      case 'cps':G.cps+=u.v;break;
      case 'cpsMult':G.cpsMult*=u.v;break;
      case 'critChance':G.critChance+=u.v;break;
      case 'combo':G.combo+=u.v;break;
      case 'boostDur':G.boostDur+=u.v;break;
      case 'boostMult':G.boostMult*=u.v;break;
      case 'offlinePct':G.offlinePct+=u.v;break;
      case 'luckyChance':G.luckyChance+=u.v;break;
      case 'prestigeBonus':G.prestigeBonus+=u.v;break;
      case 'autoClick':G.autoClick+=u.v;break;
      case 'megaBoost':G.megaBoost+=u.v;break;
    }
  }
}

function reapplyAll(){
  G.clickPow=1;G.clickFlat=0;G.cps=0;G.cpsMult=1;
  G.critChance=.05;G.combo=0;G.boostDur=8;G.boostMult=3;
  G.offlinePct=0;G.luckyChance=0;G.prestigeBonus=0;G.autoClick=0;G.megaBoost=0;
  Object.entries(G.upgrades).forEach(([id,lvl])=>{
    const u=ALL_UPG.find(x=>x.id===id);if(u)applyUpg(u,lvl);
  });
}

// ── PRESTIGE ──────────────────────────────────────────────
function checkPrestigeBtn(){document.getElementById('prestige-btn').style.display=G.totalCoins>=1000000?'block':'none';}
function doPrestige(){
  if(!confirm('Prestige: resets coins & upgrades but gives permanent ×2 multiplier bonus. Ready?'))return;
  G.prestige++;G.prestigeMult=1+G.prestige*(1+G.prestigeBonus);
  G.coins=0;G.sessionCoins=0;G.upgrades={};reapplyAll();G.upgradeCount=0;
  renderUpgrades();updateUI();scheduleSave();showAch({id:'_p',name:'Prestiged!',ic:'award'});
}

// ── ACHIEVEMENTS ──────────────────────────────────────────
function checkAchs(){
  const s={totalCoins:G.totalCoins,totalClicks:G.totalClicks,bestCrit:G.bestCrit,prestige:G.prestige,upgradeCount:G.upgradeCount};
  ACHS.forEach(a=>{if(!G.achievementsUnlocked.has(a.id)&&a.chk(s)){G.achievementsUnlocked.add(a.id);showAch(a);}});
  renderAchs();
}
function showAch(a){
  const el=document.createElement('div');el.className='ach-toast';
  el.innerHTML=`<div class="ach-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${IC[a.ic]||IC.award}</svg></div><div><div class="ach-tt">achievement</div><div class="ach-nn">${a.name}</div></div>`;
  document.getElementById('ach-root').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}
function renderAchs(){
  document.getElementById('ach-list').innerHTML=ACHS.map(a=>{
    const done=G.achievementsUnlocked.has(a.id);
    return `<div style="display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:5px;background:${done?'rgba(255,215,0,.04)':'var(--bg)'};border:1px solid ${done?'rgba(255,215,0,.2)':'var(--border)'};font-size:9px;opacity:${done?1:.32}">
      <div style="width:22px;height:22px;border-radius:4px;background:${done?'rgba(255,215,0,.1)':'rgba(255,255,255,.03)'};border:1px solid ${done?'rgba(255,215,0,.25)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:${done?'var(--gold)':'var(--muted)'};fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round" xmlns="http://www.w3.org/2000/svg">${IC[a.ic]||IC.award}</svg>
      </div>
      <div><div style="font-weight:700;color:${done?'var(--gold)':'var(--muted)'}">${a.name}</div><div style="color:var(--muted);margin-top:1px">${a.desc}</div></div>
    </div>`;
  }).join('');
}

// ── UI ────────────────────────────────────────────────────
function updateUI(){
  document.getElementById('s-coins').textContent='🪙'+fmtN(G.coins);
  document.getElementById('s-cps').textContent=fmtN(getCPS())+'/s';
  document.getElementById('s-clicks').textContent=fmtN(G.totalClicks);
  document.getElementById('s-mult').textContent='×'+G.prestigeMult.toFixed(1);
  document.getElementById('s-prestige').textContent=G.prestige;
  document.getElementById('rp-session').textContent='🪙'+fmtN(G.sessionCoins);
  document.getElementById('rp-power').textContent=fmtN(getCV());
  document.getElementById('rp-cps').textContent=fmtN(getCPS())+'/s';
  document.getElementById('rp-crit').textContent=fmtN(G.bestCrit);
  document.getElementById('rp-upgs').textContent=G.upgradeCount;
  document.getElementById('rp-key').textContent=fmtKey(settings.keybinds?.click||'Space');
  document.getElementById('btn-sub').textContent=`+${fmtN(getCV())} per click`;
  document.getElementById('key-hint').textContent=`[ ${fmtKey(settings.keybinds?.click||'Space')} ] to click  ·  [ ${fmtKey(settings.keybinds?.boost||'KeyB')} ] boost`;
  checkPrestigeBtn();
}

// ── SAVE / LOAD ───────────────────────────────────────────
let saveTO=null;
function scheduleSave(){if(saveTO)clearTimeout(saveTO);saveTO=setTimeout(saveGame,2500);}

async function saveGame(){
  const save={
    coins:G.coins,totalCoins:G.totalCoins,clicks:G.clicks,totalClicks:G.totalClicks,
    upgrades:G.upgrades,prestige:G.prestige,prestigeMult:G.prestigeMult,
    bestCrit:G.bestCrit,upgradeCount:G.upgradeCount,
    achievementsUnlocked:[...G.achievementsUnlocked],lastSave:Date.now()
  };
  localStorage.setItem('cf_save',JSON.stringify(save));
  if(window._pfSession&&!guestMode){
    try{
      await pfSetPlayerData({
        coins:String(Math.floor(G.coins)),
        clicks:String(G.totalClicks),
        upgrades:JSON.stringify(G.upgrades),
        prestige:String(G.prestige),
        last_save:String(Date.now()),
        offline_pct:String(G.offlinePct),
        game_save:JSON.stringify(save),
      });
      await pfUpdateStat('TotalCoins',Math.floor(G.totalCoins));
      await pfUpdateStat('TotalClicks',Math.floor(G.totalClicks));
      window.parent.postMessage({type:'coins_update',coins:Math.floor(G.coins)},'*');
    }catch(err){console.warn('PF save failed:',err.message);}
  }
}

function loadGame(){
  const raw=localStorage.getItem('cf_save');if(!raw)return false;
  try{
    const s=JSON.parse(raw);
    G.coins=s.coins||0;G.totalCoins=s.totalCoins||0;G.clicks=s.clicks||0;G.totalClicks=s.totalClicks||0;
    G.upgrades=s.upgrades||{};G.prestige=s.prestige||0;G.prestigeMult=s.prestigeMult||1;
    G.bestCrit=s.bestCrit||0;G.upgradeCount=s.upgradeCount||0;
    G.achievementsUnlocked=new Set(s.achievementsUnlocked||[]);
    if(s.lastSave){
      reapplyAll();
      const elapsed=(Date.now()-s.lastSave)/1000;
      const earned=Math.floor(getCPS()*elapsed*G.offlinePct);
      if(earned>100){
        G.coins+=earned;G.totalCoins+=earned;
        document.getElementById('offline-wrap').innerHTML=
          `<div class="offline-banner">💤 <strong>Offline earnings</strong><br>+🪙${fmtN(earned)} while away (${Math.floor(elapsed/60)}m)</div>`;
        setTimeout(()=>document.getElementById('offline-wrap').innerHTML='',7000);
      }
    }
    return true;
  }catch{return false;}
}

async function loadFromPF(){
  if(!window._pfSession)return;
  try{
    const d=await pfGetPlayerData(['game_save']);
    const raw=d.Data?.game_save?.Value;
    if(raw){
      const pf=JSON.parse(raw);
      const local=JSON.parse(localStorage.getItem('cf_save')||'{}');
      if(!local.lastSave||pf.lastSave>local.lastSave){
        localStorage.setItem('cf_save',raw);
        loadGame();reapplyAll();renderUpgrades();updateUI();renderAchs();
      }
    }
  }catch(e){console.warn('PF load failed:',e.message);}
}

// ── LEADERBOARD ───────────────────────────────────────────
async function loadMiniLb(){
  const el=document.getElementById('mini-lb');
  el.innerHTML='<div style="font-size:10px;color:var(--muted)">loading...</div>';
  if(!window._pfSession){el.innerHTML='<div style="font-size:10px;color:var(--muted)">sign in to view</div>';return;}
  try{
    const data=await pfGetLeaderboard('TotalCoins',5);
    const entries=data.Leaderboard||[];
    if(!entries.length){el.innerHTML='<div style="font-size:10px;color:var(--muted)">no entries yet — play to appear!</div>';return;}
    const medals=['🥇','🥈','🥉'];
    el.innerHTML=entries.map((e,i)=>{
      const me=window._pfPlayer&&e.PlayFabId===window._pfPlayer.id;
      const av=strColor(e.DisplayName||'?');
      return `<div class="mlb-row${me?' me':''}">
        <div class="mlb-rank">${i<3?medals[i]:'#'+(i+1)}</div>
        <div class="mlb-av" style="background:${av};color:#fff">${(e.DisplayName||'?')[0].toUpperCase()}</div>
        <div class="mlb-name">${e.DisplayName||'Anon'}${me?' <span style="color:var(--p1);font-size:8px">(you)</span>':''}</div>
        <div class="mlb-val">🪙${fmtN(e.StatValue)}</div>
      </div>`;
    }).join('');
  }catch(e){el.innerHTML=`<div style="font-size:10px;color:var(--p2)">error: ${e.message}</div>`;}
}

// ── AUDIO ─────────────────────────────────────────────────
let AC=null;
function gAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playClick(big=false){
  try{const a=gAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.frequency.value=big?880:380+Math.random()*120;
    o.frequency.exponentialRampToValueAtTime(big?1400:700,a.currentTime+.06);
    g.gain.value=.06;g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.09);
    o.start();o.stop(a.currentTime+.09);}catch{}
}
function playBuy(){
  try{const a=gAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type='triangle';
    o.frequency.value=523;o.frequency.setValueAtTime(660,a.currentTime+.08);
    o.frequency.setValueAtTime(784,a.currentTime+.18);
    g.gain.value=.08;g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.3);
    o.start();o.stop(a.currentTime+.3);}catch{}
}
function playBoost(){
  try{const a=gAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type='sawtooth';
    o.frequency.value=180;o.frequency.exponentialRampToValueAtTime(900,a.currentTime+.35);
    g.gain.value=.09;g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.45);
    o.start();o.stop(a.currentTime+.45);}catch{}
}

// ── KEYBINDS ─────────────────────────────────────────────
// Uses capture so it fires even inside iframe focus
window.addEventListener('keydown',function(e){
  const kb=settings.keybinds||{};
  const clickCode=kb.click||'Space';
  const boostCode=kb.boost||'KeyB';
  if(e.code===clickCode){
    e.preventDefault();
    const btn=document.getElementById('click-btn');
    const r=btn.getBoundingClientRect();
    doClick(r.left+r.width/2,r.top+r.height/2);
    return;
  }
  if(e.code===boostCode){e.preventDefault();activateBoost();return;}
},true);

// ── MESSAGES FROM PARENT ──────────────────────────────────
window.addEventListener('message',function(e){
  if(!e.data)return;
  const d=e.data;
  if(d.type==='auth'){
    window._pfSession=d.session;
    window._pfPlayer=d.player;
    document.getElementById('login-prompt').classList.add('hidden');
    guestMode=false;
    loadFromPF().then(()=>loadMiniLb());
  }
  if(d.type==='settings'&&d.settings){
    // Deep merge keybinds
    if(d.settings.keybinds){
      Object.assign(settings.keybinds,d.settings.keybinds);
    }
    if(d.settings.sfx!==undefined)settings.sfx=d.settings.sfx;
    updateUI();updateBoostUI();
  }
  if(d.type==='cosmetics')applyCosmetics(d.equipped);
});

// ── COSMETICS ─────────────────────────────────────────────
function applyCosmetics(equipped){
  if(!equipped)return;
  const btn=document.getElementById('click-btn');
  const sk={
    btn_default:{bg:'rgba(0,240,255,.16)',br:'#00f0ff',glow:'rgba(0,240,255,.3)'},
    btn_neon:   {bg:'rgba(0,240,255,.3)', br:'#00f0ff',glow:'rgba(0,240,255,.55)'},
    btn_lava:   {bg:'rgba(255,68,0,.2)',  br:'#ff4400',glow:'rgba(255,68,0,.4)'},
    btn_void:   {bg:'rgba(153,69,255,.2)',br:'#9945ff',glow:'rgba(153,69,255,.4)'},
    btn_holo:   {bg:'rgba(255,215,0,.15)',br:'#ffd700',glow:'rgba(255,215,0,.4)'},
  };
  const s=sk[equipped.button]||sk.btn_default;
  btn.style.background=`radial-gradient(circle at 38% 32%,${s.bg} 0%,transparent 70%)`;
  btn.style.borderColor=s.br;
  btn.style.boxShadow=`0 0 55px ${s.glow},0 0 110px ${s.glow}55,inset 0 0 50px ${s.glow}40`;
  const svg=document.getElementById('btn-main-svg');
  if(svg)svg.style.stroke=s.br;
  document.querySelectorAll('.pring').forEach(r=>r.style.borderColor=s.br+'44');
}

function playAsGuest(){guestMode=true;document.getElementById('login-prompt').classList.add('hidden');}

// ── BOOT ──────────────────────────────────────────────────
loadGame();
reapplyAll();
renderUpgrades();
updateUI();
renderAchs();
updateBoostUI();

setInterval(()=>saveGame(),15000);
setInterval(()=>{if(window._pfSession)loadMiniLb();},30000);
setInterval(()=>{renderUpgrades();},500);

if(window._pfSession||loadSession()){
  document.getElementById('login-prompt').classList.add('hidden');
  loadFromPF().then(()=>loadMiniLb());
}else{
  setTimeout(()=>document.getElementById('login-prompt').classList.remove('hidden'),1500);
}
</script>
